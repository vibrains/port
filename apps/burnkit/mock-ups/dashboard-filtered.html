                // At-risk external clients (high non-billable %)
                const atRiskClients = externalClients

                    .slice(0, 5);

                const mostEfficient = personData

                    .map(p => ({ ...p, billablePercent: (p.billable / p.total) * 100 }))

                    .slice(0, 5);

                // People primarily on internal work
                const internalFocused = personData
                    .filter(p => p.nonBillablePercent >= 90 && p.total >= 300)

            const [selectedClients, setSelectedClients] = useState(new Set(clientData.map(c => c.client)));
            const [selectedPersons, setSelectedPersons] = useState(new Set(allPersons));
            const [selectedDepartments, setSelectedDepartments] = useState(new Set(allDepartments));
            const [showInternalOnly, setShowInternalOnly] = useState(null);

            // Table-level filters
            const [clientTableSearch, setClientTableSearch] = useState('');
            const [personTableSearch, setPersonTableSearch] = useState('');
            const [pcTableSearch, setPcTableSearch] = useState('');
            const [pcClientFilter, setPcClientFilter] = useState('');
            const [pcPersonFilter, setPcPersonFilter] = useState('');
            const [personClientFilter, setPersonClientFilter] = useState('');
            const [pcDeptFilter, setPcDeptFilter] = useState('');
            const [personDeptFilter, setPersonDeptFilter] = useState('');

            // Filtered data based on global selections
            const filteredClientData = useMemo(() => {
                return clientData.filter(c => {
                    if (showInternalOnly === true && !c.isInternal) return false;
                    if (showInternalOnly === false && c.isInternal) return false;
                    return selectedClients.has(c.client);
                });
            }, [selectedClients, showInternalOnly]);

            const filteredPersonData = useMemo(() => {
                const clientSet = new Set(filteredClientData.map(c => c.client));
                const personTotals = {};

                personClientDataWithDept.forEach(pc => {
                    // Check if person's department is selected
                    if (!selectedDepartments.has(pc.department)) return;
                    if (clientSet.has(pc.client) && selectedPersons.has(pc.person)) {
                        if (!personTotals[pc.person]) {
                            personTotals[pc.person] = { person: pc.person, department: pc.department, billable: 0, nonBillable: 0, total: 0, billableDollars: 0, nonBillableDollars: 0, totalDollars: 0 };
                        }
                        personTotals[pc.person].billable += pc.billable;
                        personTotals[pc.person].nonBillable += pc.nonBillable;
                        personTotals[pc.person].total += pc.total;
                        personTotals[pc.person].billableDollars += pc.billableDollars;
                        personTotals[pc.person].nonBillableDollars += pc.nonBillableDollars;
                        personTotals[pc.person].totalDollars += pc.totalDollars;
                    }
                });

                return Object.values(personTotals).map(p => ({
                    ...p,
                    nonBillablePercent: p.total > 0 ? Math.round((p.nonBillable / p.total) * 1000) / 10 : 0
                })).sort((a, b) => b.total - a.total);
            }, [filteredClientData, selectedPersons, selectedDepartments]);

            const filteredPersonClientData = useMemo(() => {
                const clientSet = new Set(filteredClientData.map(c => c.client));
                return personClientDataWithDept.filter(pc =>
                    clientSet.has(pc.client) &&
                    selectedPersons.has(pc.person) &&
                    selectedDepartments.has(pc.department)
                );
            }, [filteredClientData, selectedPersons, selectedDepartments]);

            const filteredTotals = useMemo(() => {
                const billable = filteredClientData.reduce((sum, c) => sum + c.billable, 0);
                const nonBillable = filteredClientData.reduce((sum, c) => sum + c.nonBillable, 0);
                const total = billable + nonBillable;
                const billableDollars = filteredClientData.reduce((sum, c) => sum + c.billableDollars, 0);
                const nonBillableDollars = filteredClientData.reduce((sum, c) => sum + c.nonBillableDollars, 0);
                const totalDollars = billableDollars + nonBillableDollars;
                return { billable, nonBillable, total, billableDollars, nonBillableDollars, totalDollars };
            }, [filteredClientData]);

            // Unique values for table filters
            const uniqueClientsInPCData = useMemo(() =>
                [...new Set(filteredPersonClientData.map(pc => pc.client))].sort()
            , [filteredPersonClientData]);
            const uniquePersonsInPCData = useMemo(() =>
                [...new Set(filteredPersonClientData.map(pc => pc.person))].sort()
            , [filteredPersonClientData]);
            const uniqueDeptsInPCData = useMemo(() =>
                [...new Set(filteredPersonClientData.map(pc => pc.department))].sort()
            , [filteredPersonClientData]);
            const uniqueClientsForPersonTable = useMemo(() =>
                [...new Set(personClientDataWithDept.filter(pc => selectedPersons.has(pc.person) && selectedDepartments.has(pc.department)).map(pc => pc.client))].sort()
            , [selectedPersons, selectedDepartments]);
            const uniqueDeptsForPersonTable = useMemo(() =>
                [...new Set(filteredPersonData.map(p => p.department))].sort()
            , [filteredPersonData]);

            // Quick filter functions
            const resetFilters = () => {
                setSelectedClients(new Set(clientData.map(c => c.client)));

                setSelectedDepartments(new Set(allDepartments));

            const clientColumns = [

                { key: 'person', label: 'Person', render: (row) => (
                    <span className="font-medium text-slate-900">{row.person}</span>

                    <span className="text-red-600 font-semibold">{showDollars ? formatMoney(row.nonBillableDollars) : formatNumber(row.nonBillable)}</span>
                )},
                { key: 'total', sortKey: 'total', label: 'Total', align: 'right', render: (row, showDollars, formatMoney, formatNumber) => (
                    <span className="font-medium">{showDollars ? formatMoney(row.totalDollars) : formatNumber(row.total)}</span>
                )},
                { key: 'nonBillablePercent', label: 'Non-Billable %', align: 'right', render: (row) => (
                    <Badge variant={row.nonBillablePercent >= 70 ? 'destructive' : row.nonBillablePercent >= 40 ? 'warning' : 'success'}>
                        {row.nonBillablePercent}%
                    </Badge>

            const personClientColumns = [

                    <span className="font-medium text-slate-900">{row.person}</span>

                { key: 'department', label: 'Dept', render: (row) => (

                    </Badge>

                { key: 'client', label: 'Client', render: (row) => (
                    <div className="flex items-center gap-2">
                        <span className="text-slate-700">{row.client}</span>
                        {row.isInternal && <Badge variant="secondary" className="text-[10px] px-1.5">Int</Badge>}
                    </div>
                )},
                { key: 'billable', sortKey: 'billable', label: 'Billable', align: 'right', render: (row, showDollars, formatMoney, formatNumber) => (
                    <span className="text-emerald-600 font-medium">{showDollars ? formatMoney(row.billableDollars) : formatNumber(row.billable)}</span>
                )},
                { key: 'nonBillable', sortKey: 'nonBillable', label: 'Non-Billable', align: 'right', render: (row, showDollars, formatMoney, formatNumber) => (
                    <span className="text-red-600 font-semibold">{showDollars ? formatMoney(row.nonBillableDollars) : formatNumber(row.nonBillable)}</span>
                )},
                { key: 'total', sortKey: 'total', label: 'Total', align: 'right', render: (row, showDollars, formatMoney, formatNumber) => (
                    <span className="font-medium">{showDollars ? formatMoney(row.totalDollars) : formatNumber(row.total)}</span>
                )},
                { key: 'nonBillablePercent', label: 'Non-Billable %', align: 'right', render: (row) => (
                    <Badge variant={row.nonBillablePercent >= 70 ? 'destructive' : row.nonBillablePercent >= 40 ? 'warning' : 'success'}>
                        {row.nonBillablePercent.toFixed(1)}%
                    </Badge>
                )},
            ];

            return (
                <div className="min-h-screen bg-slate-50">
                    {/* Header */}
                    <header className="bg-white border-b">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
                            <div className="flex items-center justify-between">
                                <div>
                                    <h1 className="text-2xl font-bold text-slate-900">H2 2025 Hours Analysis</h1>
                                    <p className="text-sm text-muted-foreground mt-1">
                                        Billable vs Non-Billable breakdown by client and person
                                    </p>
                                </div>
                                <div className="text-right">
                                    <div className="text-sm text-muted-foreground">Filtered Total</div>
                                    <div className="text-2xl font-bold">{filteredTotals.total.toLocaleString()} hrs</div>
                                    <Badge variant={filteredTotals.billable / filteredTotals.total >= 0.5 ? 'success' : 'warning'}>
                                        {filteredTotals.total > 0 ? ((filteredTotals.billable/filteredTotals.total)*100).toFixed(1) : 0}% Billable
                                    </Badge>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-6">
                        {/* Global Filters Card */}
                        <Card>
                            <CardContent className="pt-6">
                                <div className="flex flex-wrap items-center gap-4">
                                    <span className="text-sm font-medium text-slate-700">Quick Filters:</span>
                                    <div className="flex gap-2">
                                        <Button
                                            variant={showInternalOnly === null && selectedClients.size === clientData.length ? 'default' : 'outline'}
                                            size="sm"
                                            onClick={resetFilters}
                                        >
                                            All
                                        </Button>
                                        <Button
                                            variant={showInternalOnly === false ? 'default' : 'outline'}
                                            size="sm"
                                            onClick={selectExternalOnly}
                                        >
                                            External Only
                                        </Button>
                                        <Button
                                            variant={showInternalOnly === true ? 'default' : 'outline'}
                                            size="sm"
                                            onClick={selectInternalOnly}
                                        >
                                            Internal Only
                                        </Button>
                                    </div>

                                    <div className="h-6 w-px bg-slate-200"></div>

                                    <MultiSelect
                                        options={clientData.map(c => ({
                                            value: c.client,
                                            label: c.client,
                                            badge: c.isInternal ? 'Internal' : null,
                                            badgeVariant: 'secondary'
                                        }))}
                                        selected={selectedClients}
                                        onChange={setSelectedClients}
                                        placeholder="Select clients..."
                                        label="clients"
                                    />

                                    <MultiSelect
                                        options={allPersons.map(p => ({
                                            value: p,
                                            label: p,
                                            badge: personDepartment[p],
                                            badgeVariant: personDepartment[p] === 'Freelance' ? 'warning' : personDepartment[p] === 'Media' ? 'default' : 'secondary'
                                        }))}
                                        selected={selectedPersons}
                                        onChange={setSelectedPersons}
                                        placeholder="Select people..."
                                        label="people"
                                    />

                                    <MultiSelect
                                        options={allDepartments.map(d => ({
                                            value: d,
                                            label: d,
                                            badge: d === 'Freelance' ? 'Contract' : d === 'Services' ? 'Strategy' : 'Creative'
                                        }))}
                                        selected={selectedDepartments}
                                        onChange={setSelectedDepartments}
                                        placeholder="Select departments..."
                                        label="departments"
                                    />

                                    <div className="ml-auto">
                                        <Button
                                            variant="outline"
                                            size="sm"
                                            onClick={() => setShowDollars(!showDollars)}
                                        >
                                            {showDollars ? '$ Dollars' : '⏱ Hours'}
                                        </Button>
                                    </div>
                                </div>
                            </CardContent>
                        </Card>

                        {/* Summary Cards */}
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <Card className="bg-gradient-to-br from-emerald-500 to-emerald-600 text-white border-0">
                                <CardContent className="pt-6">
                                    <div className="text-emerald-100 text-sm font-medium">Billable</div>
                                    <div className="text-2xl font-bold mt-1">
                                        {showDollars ? formatMoney(filteredTotals.billableDollars) : filteredTotals.billable.toLocaleString()}
                                    </div>
                                    <div className="text-emerald-200 text-sm mt-1">
                                        {filteredTotals.total > 0 ? ((filteredTotals.billable/filteredTotals.total)*100).toFixed(1) : 0}% of total
                                    </div>
                                </CardContent>
                            </Card>

                            <Card className="bg-gradient-to-br from-red-500 to-rose-600 text-white border-0">
                                <CardContent className="pt-6">
                                    <div className="text-red-100 text-sm font-medium">Non-Billable</div>
                                    <div className="text-2xl font-bold mt-1">
                                        {showDollars ? formatMoney(filteredTotals.nonBillableDollars) : filteredTotals.nonBillable.toLocaleString()}
                                    </div>
                                    <div className="text-red-200 text-sm mt-1">
                                        {filteredTotals.total > 0 ? ((filteredTotals.nonBillable/filteredTotals.total)*100).toFixed(1) : 0}% of total
                                    </div>
                                </CardContent>
                            </Card>

                            <Card className="bg-gradient-to-br from-slate-700 to-slate-800 text-white border-0">
                                <CardContent className="pt-6">
                                    <div className="text-slate-300 text-sm font-medium">Total {showDollars ? 'Value' : 'Hours'}</div>
                                    <div className="text-2xl font-bold mt-1">
                                        {showDollars ? formatMoney(filteredTotals.totalDollars) : filteredTotals.total.toLocaleString()}
                                    </div>
                                    <div className="text-slate-400 text-sm mt-1">
                                        {filteredClientData.length} clients
                                    </div>
                                </CardContent>
                            </Card>

                            <Card className="bg-gradient-to-br from-violet-500 to-purple-600 text-white border-0">
                                <CardContent className="pt-6">
                                    <div className="text-violet-200 text-sm font-medium">Team Members</div>
                                    <div className="text-2xl font-bold mt-1">{filteredPersonData.length}</div>
                                    <div className="text-violet-300 text-sm mt-1">
                                        {filteredPersonClientData.length} assignments
                                    </div>
                                </CardContent>
                            </Card>
                        </div>

                        {/* Tabs */}
                        <Card>
                            <CardHeader className="pb-0">
                                <Tabs value={activeTab} onValueChange={setActiveTab}>
                                    <TabsList className="w-full justify-start">
                                        <TabsTrigger value="insights">Insights</TabsTrigger>
                                        <TabsTrigger value="clients">By Client</TabsTrigger>
                                        <TabsTrigger value="people">By Person</TabsTrigger>
                                        <TabsTrigger value="personClient">Person × Client</TabsTrigger>
                                    </TabsList>
                                </Tabs>
                            </CardHeader>
                            <CardContent className="pt-6">
                                {activeTab === 'insights' && (
                                    <InsightsTab
                                        clientData={filteredClientData}
                                        personData={filteredPersonData}
                                        personClientData={filteredPersonClientData}
                                        totals={filteredTotals}
                                        showDollars={showDollars}
                                        formatMoney={formatMoney}
                                    />
                                )}

                                {activeTab === 'clients' && (
                                    <DataTable
                                        columns={clientColumns}
                                        data={filteredClientData}
                                        showDollars={showDollars}
                                        tableSearch={clientTableSearch}
                                        setTableSearch={setClientTableSearch}
                                    />
                                )}

                                {activeTab === 'people' && (
                                    <DataTable
                                        columns={personColumns}
                                        data={filteredPersonData}
                                        showDollars={showDollars}
                                        tableSearch={personTableSearch}
                                        setTableSearch={setPersonTableSearch}
                                        clientFilter={personClientFilter}
                                        setClientFilter={setPersonClientFilter}
                                        deptFilter={personDeptFilter}
                                        setDeptFilter={setPersonDeptFilter}
                                        uniqueClients={uniqueClientsForPersonTable}
                                        uniqueDepts={uniqueDeptsForPersonTable}
                                    />
                                )}

                                {activeTab === 'personClient' && (
                                    <DataTable
                                        columns={personClientColumns}
                                        data={filteredPersonClientData}
                                        showDollars={showDollars}
                                        tableSearch={pcTableSearch}
                                        setTableSearch={setPcTableSearch}
                                        clientFilter={pcClientFilter}
                                        setClientFilter={setPcClientFilter}
                                        personFilter={pcPersonFilter}
                                        setPersonFilter={setPcPersonFilter}
                                        deptFilter={pcDeptFilter}
                                        setDeptFilter={setPcDeptFilter}
                                        uniqueClients={uniqueClientsInPCData}
                                        uniquePersons={uniquePersonsInPCData}
                                        uniqueDepts={uniqueDeptsInPCData}
                                    />
                                )}
                            </CardContent>
                        </Card>

                        {/* Footer Note */}
                        <div className="text-center text-sm text-muted-foreground">
                            Data source: Excel "Is Non Billable" flag • H2 2025 (July - December) • Excludes AAA ACA & LA Kings
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.render(<Dashboard />, document.getElementById('root'));
    </script>
</body>
</html>
